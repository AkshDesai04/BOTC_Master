<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🩸 Storyteller's Grimoire</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div id="app"></div>

<!-- Load all BOTC script data -->
<script src="scripts/trouble_brewing.js"></script>
<script src="scripts/bad_moon_rising.js"></script>
<script src="scripts/sects_and_violets.js"></script>
<script src="scripts/common.js"></script>
<script>
// Start game engine
(function() {
  try {
    const saved = loadFromStorage();
    if (saved && saved._saved) {
      Object.assign(state, saved);
      state.showResume = true;
    } else {
      state.screen = "select";
    }
    render();
  } catch (error) {
    console.error("Initialization error:", error);
    const app = document.getElementById("app");
    if (app) {
      app.innerHTML = `<div class="screen" style="padding:32px;text-align:center">
        <h2 style="color:var(--red);margin-bottom:16px">Error Loading Page</h2>
        <p style="color:var(--text2);margin-bottom:8px">${error.message}</p>
        <button class="btn btn-primary" style="margin-top:16px" onclick="location.reload()">Reload Page</button>
      </div>`;
    }
  }
})();
</script>
</body>
</html>
